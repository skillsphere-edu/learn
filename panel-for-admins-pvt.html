<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSphere Admin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  background:#070b14;
  color:#fff;
  font-family: Inter, sans-serif;
  display:flex;
  justify-content:center;
  padding:40px;
}

.card {
  width:500px;
  background:#121829;
  padding:30px;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h2 { margin-bottom:20px; }

input {
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  background:#d4af37;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

#status {
  margin-top:15px;
  font-size:14px;
}

#certificate {
  display:none;
  padding:30px;
  border:5px solid gold;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>Issue Certificate</h2>

<input id="name" placeholder="Student Name">
<input id="course" placeholder="Course Name">

<button onclick="issueCertificate()">Issue Certificate</button>

<div id="status"></div>

<div id="certificate">
  <h1>SkillSphere Certificate</h1>
  <h2 id="certName"></h2>
  <p id="certCourse"></p>
  <p id="certId"></p>
  <div id="qr"></div>
</div>

</div>

<script>
const SECRET = "SKILLSPHERE_ULTRA_SECRET_2026";
const API_KEY = "skillsphere-ss-na-11998";
const WORKER_URL = "https://skillsphere-verify.skillsphere-work.workers.dev/admin-upload";

function generateID() {
  return "SS-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function sha256(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function issueCertificate() {

  const name = document.getElementById("name").value;
  const course = document.getElementById("course").value;
  const status = document.getElementById("status");

  if (!name || !course) {
    alert("Fill all fields");
    return;
  }

  status.innerText = "Generating...";

  const id = generateID();
  const signature = await sha256(id + SECRET);

  // Upload to Cloudflare
  await fetch(WORKER_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({
      id,
      course,
      issued: new Date().toISOString().split("T")[0],
      signature
    })
  });

  // Prepare certificate UI
  document.getElementById("certificate").style.display = "block";
  document.getElementById("certName").innerText = name;
  document.getElementById("certCourse").innerText = course;
  document.getElementById("certId").innerText = id;

  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: `https://skillsphere-edu.github.io/learn/verify?id=${id}`,
    width: 100,
    height: 100
  });

  // Generate PDF
  await html2pdf().from(document.getElementById("certificate")).save(`${name}.pdf`);

  status.innerText = "✅ Certificate issued successfully";
}
</script>

</body>
</html>

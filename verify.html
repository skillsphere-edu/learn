<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify Certificate — SkillSphere</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #070b14;
  --card: rgba(18, 24, 41, 0.75);
  --border: rgba(255,255,255,0.08);
  --gold: #d4af37;
  --gold-soft: #f6e6a8;
  --text: #e8ecf3;
  --muted: #9aa4b2;
  --green: #2ecc71;
  --red: #e74c3c;
}

/* RESET */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: radial-gradient(circle at 20% 20%, #0f172a, #070b14);
  color: var(--text);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTAINER */
.container {
  width:100%;
  max-width:520px;
  padding:20px;
}

/* CARD */
.card {
  background: var(--card);
  backdrop-filter: blur(20px);
  border:1px solid var(--border);
  border-radius:20px;
  padding:35px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  text-align:center;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity:0; transform: translateY(10px); }
  to { opacity:1; transform: translateY(0); }
}

/* BRAND */
.logo {
  font-weight:600;
  font-size:18px;
  margin-bottom:20px;
  letter-spacing:1px;
}

.logo span {
  color: var(--gold);
}

/* TITLE */
h1 {
  font-size:26px;
  margin-bottom:8px;
}

.subtitle {
  color: var(--muted);
  margin-bottom:25px;
}

/* INPUT */
.input-box {
  position:relative;
}

input {
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid var(--border);
  background: transparent;
  color:var(--text);
  font-size:15px;
  outline:none;
  transition:0.3s;
}

input:focus {
  border-color: var(--gold);
  box-shadow:0 0 0 2px rgba(212,175,55,0.2);
}

/* BUTTON */
button {
  width:100%;
  margin-top:15px;
  padding:16px;
  border-radius:12px;
  border:none;
  background: linear-gradient(135deg, var(--gold), #b8962e);
  color:#000;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform: translateY(-1px);
  box-shadow:0 10px 30px rgba(212,175,55,0.25);
}

/* RESULT */
.result {
  margin-top:25px;
  padding:20px;
  border-radius:14px;
  display:none;
  text-align:left;
  animation: fadeIn 0.5s ease;
}

.verified {
  border:1px solid rgba(46,204,113,0.4);
  background: rgba(46,204,113,0.08);
}

.notfound {
  border:1px solid rgba(231,76,60,0.4);
  background: rgba(231,76,60,0.08);
}

.result h3 {
  margin-bottom:10px;
}

.row {
  margin-bottom:8px;
}

.label {
  font-size:13px;
  color: var(--muted);
}

.value {
  font-weight:500;
}

/* LOADER */
.loader {
  margin-top:20px;
  display:none;
}

.spinner {
  border:3px solid rgba(255,255,255,0.1);
  border-top:3px solid var(--gold);
  border-radius:50%;
  width:28px;
  height:28px;
  animation: spin 0.8s linear infinite;
  margin:auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* FOOTER */
.footer {
  margin-top:20px;
  font-size:12px;
  color: var(--muted);
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="logo">Skill<span>Sphere</span></div>

    <h1>Verify Certificate</h1>
    <div class="subtitle">Instantly validate authenticity</div>

    <div class="input-box">
      <input type="text" id="certId" placeholder="Enter Certificate ID">
    </div>

    <button onclick="verifyCert()">Verify Now</button>

    <div class="loader" id="loader">
      <div class="spinner"></div>
    </div>

    <div id="result" class="result"></div>

    <div class="footer">
      Secure verification powered by SkillSphere
    </div>

  </div>
</div>

<script>
async function verifyCert() {
  const id = document.getElementById("certId").value.trim();
  const resultBox = document.getElementById("result");
  const loader = document.getElementById("loader");

  if (!id) return alert("Enter Certificate ID");

  resultBox.style.display = "none";
  loader.style.display = "block";

  try {
    const res = await fetch(`https://skillsphere-verify.skillsphere-work.workers.dev/verify?id=${id}`);
    const data = await res.json();

    loader.style.display = "none";
    resultBox.style.display = "block";

    if (data.valid) {
      resultBox.className = "result verified";
      resultBox.innerHTML = `
  <h3 style="color:#2ecc71;">✔ Certificate Verified</h3>

  <div class="row">
    <div class="label">Name</div>
    <div class="value">${data.name}</div>
  </div>

  <div class="row">
    <div class="label">Course</div>
    <div class="value">${data.course}</div>
  </div>

  <div class="row">
    <div class="label">Issued On</div>
    <div class="value">${data.issued}</div>
  </div>

  <div class="row">
    <div class="label">Certificate ID</div>
    <div class="value">${id}</div>
  </div>
`;
    } else {
      resultBox.className = "result notfound";
      resultBox.innerHTML = `
        <h3 style="color:#e74c3c;">Invalid Certificate</h3>
        <p>Please check the ID or contact support.</p>
      `;
    }

  } catch (e) {
    loader.style.display = "none";
    alert("Server error. Try again.");
  }
}

// AUTO VERIFY FROM URL
const params = new URLSearchParams(window.location.search);
const urlId = params.get("id");

if (urlId) {
  document.getElementById("certId").value = urlId;
  verifyCert();
}
</script>

</body>
</html>

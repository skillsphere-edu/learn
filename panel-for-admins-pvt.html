<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSphere Admin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  background:#070b14;
  color:#fff;
  font-family: Inter, sans-serif;
  display:flex;
  justify-content:center;
  padding:40px;
}

.card {
  width:500px;
  background:#121829;
  padding:30px;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h2 { margin-bottom:20px; }

input {
  width:100%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
  border:none;
}

button {
  width:100%;
  padding:14px;
  background:#d4af37;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

#status {
  margin-top:15px;
  font-size:14px;
}

#certificate {
  display:none;
  padding:30px;
  border:5px solid gold;
  text-align:center;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>Issue Certificate</h2>

<input id="name" placeholder="Student Name">
<input id="course" placeholder="Course Name">

<button onclick="issueCertificate()">Issue Certificate</button>

<div id="status"></div>

<div id="certificate" style="
  display:none;
  width:1000px;
  padding:60px;
  background:linear-gradient(135deg,#0b0f1a,#121829);
  color:#fff;
  border:10px solid #d4af37;
  text-align:center;
  font-family: Georgia, serif;
  position:relative;
">

  <!-- Brand -->
  <h1 style="font-size:42px; letter-spacing:2px;">SkillSphere</h1>
  <p style="color:#d4af37; letter-spacing:3px; font-size:14px;">
    CERTIFICATE OF COMPLETION
  </p>

  <!-- Content -->
  <p style="margin-top:40px; font-size:18px;">
    This is to certify that
  </p>

  <h2 id="certName" style="
    font-size:36px;
    margin:20px 0;
    color:#d4af37;
    font-weight:600;
  "></h2>

  <p style="font-size:18px;">
    has successfully completed the course
  </p>

  <h3 id="certCourse" style="
    font-size:24px;
    margin:15px 0;
  "></h3>

  <p id="certDate" style="margin-top:20px; color:#ccc;"></p>

  <!-- QR -->
  <div style="margin-top:40px;">
    <div id="qr"></div>
  </div>

  <!-- ID -->
  <p id="certId" style="
    margin-top:20px;
    font-size:14px;
    color:#aaa;
  "></p>

  <!-- Signatures -->
  <div style="
    margin-top:60px;
    display:flex;
    justify-content:space-between;
    padding:0 40px;
  ">
    <div>
      <p>____________________</p>
      <p>Founder, SkillSphere</p>
    </div>

    <div>
      <p>____________________</p>
      <p>Authorized Signature</p>
    </div>
  </div>

</div>

</div>

<script>
const SECRET = "SKILLSPHERE_ULTRA_SECRET_2026";
const API_KEY = "skillsphere-ss-na-11998";
const WORKER_URL = "https://skillsphere-verify.skillsphere-work.workers.dev/admin-upload";

function generateID() {
  return "SS-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function sha256(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function issueCertificate() {

  const name = document.getElementById("name").value;
  const course = document.getElementById("course").value;
  const status = document.getElementById("status");

  if (!name || !course) {
    alert("Fill all fields");
    return;
  }

  status.innerText = "Generating...";

  const id = generateID();
  const signature = await sha256(id + SECRET);

  // Upload to Cloudflare
  await fetch(WORKER_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({
      id,
      name,
      course,
      issued: new Date().toISOString().split("T")[0],
      signature
    })
  });

  // Prepare certificate UI
  document.getElementById("certificate").style.display = "block";
  document.getElementById("certName").innerText = name;
  document.getElementById("certCourse").innerText = course;
  document.getElementById("certId").innerText = id;

  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: `https://skillsphere-edu.github.io/learn/verify.html?id=${id}`,
    width: 100,
    height: 100
  });

  // Generate PDF
  setTimeout(async () => {
  await html2pdf().from(document.getElementById("certificate")).save(`${name}.pdf`);
  status.innerText = "✅ Certificate issued successfully";
}, 800);

}
</script>

</body>
</html>

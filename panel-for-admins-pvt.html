<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSphere Admin</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
  background:#ffffff;
  color:#111;
  font-family: Inter, sans-serif;
  display:flex;
  justify-content:center;
  padding:40px;
}

.card {
  width:500px;
  background:#92aefa;
  padding:30px;
  border-radius:16px;
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

h2 { margin-bottom:20px; }

input {
  width:95%;
  padding:14px;
  margin-bottom:12px;
  border-radius:10px;
}

button {
  width:100%;
  padding:14px;
  background:#d4af37;
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

#status {
  margin-top:15px;
  font-size:14px;
}

#certificate {
  display:none;
}
</style>
</head>

<body>

<div class="card">

<h2>Issue Certificate</h2>

<input id="name" placeholder="Student Name">
<input id="course" placeholder="Course Name">
<input id="desc" placeholder="Description">

<button onclick="issueCertificate()">Issue Certificate</button>

<div id="status"></div>

<div id="certificate" style="
  width:1123px;
  height:794px;
  padding:60px;
  background:
  linear-gradient(#ffffff, #ffffff),
  repeating-linear-gradient(
    45deg,
    rgba(212,175,55,0.02),
    rgba(212,175,55,0.02) 2px,
    transparent 2px,
    transparent 6px
  );
  color:#111;
  font-family: 'Georgia', serif;
  position:relative;
  box-sizing:border-box;
  border:12px solid #d4af37;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.03), 0 10px 30px rgba(0,0,0,0.08);
">

  <!-- INNER BORDER -->
  <div style="
    position:absolute;
    top:20px;
    left:20px;
    right:20px;
    bottom:20px;
    border:2px solid rgba(212,175,55,0.5);
  "></div>

  <!-- WATERMARK -->
  <div style="
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size:120px;
    color:rgba(212,175,55,0.08);
    letter-spacing:10px;
    pointer-events:none;
  ">
    SKILLSPHERE
  </div>

  <!-- HEADER -->
  <div style="text-align:center;">
  <h1 style="
    font-size:40px;
    letter-spacing:5px;
    color:#222;
    font-weight:600;
  ">SkillSphere</h1>

  <p style="
    color:#b8962e;
    letter-spacing:6px;
    font-size:12px;
    margin-top:5px;
  ">
    CERTIFICATE OF COMPLETION
  </p>
</div>

  <!-- CONTENT -->
  <div style="text-align:center; margin-top:70px;">
    <p style="font-size:16px; color:#444;">This is to certify that</p>

    <h2 id="certName" style="
  font-size:44px;
  color:#b8962e;
  letter-spacing:1.5px;
  font-weight:600;
  margin:25px 0;
"></h2>

    <p style="font-size:18px;">has successfully completed the course</p>

    <h3 id="certCourse" style="
  font-size:25px;
  color:#454590;
  font-weight:500;
  letter-spacing:0.5px;
"></h3>

<h3 id="certDesc" style="
  font-size:15px;
  color:#222;
  font-weight:500;
  letter-spacing:0.5px;
"></h3>

    

  <div style="
  position:absolute;
  left:90px;
  bottom:130px;
  width:110px;
  height:110px;
  border-radius:50%;
  border:3px solid #d4af37;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  color:#b8962e;
  font-weight:600;
  text-align:center;
  background:radial-gradient(circle, rgba(212,175,55,0.15), transparent);
">
  VERIFIED<br>SKILLSPHERE
</div>
  
  <!-- FOOTER -->
  <div style="
    position:absolute;
    bottom:60px;
    left:60px;
    right:60px;
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
  ">

    <!-- SIGNATURE -->
<div style="text-align:left;">
  <img src="Sign.png" style="height:75px; margin-bottom:1px; filter: contrast(1.2);">
  
  <div style="
    width:160px;
    border-top:1px solid #aaa;
    margin-top:4px;
  "></div>

  <p style="margin:4px 0 0; font-size:14px;"><strong>Naufil U. Ansari</strong></p>
  <p style="margin:0; font-size:12px; color:#777;">COO &amp; Co-Founder, SkillSphere</p>
</div>
<p id="certDate" style="margin-left:-45px; color:#454590;"></p>
    <!-- QR -->
    <div style="text-align:center;">
  <div id="qr" style="margin:auto;"></div>
  <p id="certId" style="
  font-size:11px;
  margin-top:6px;
  color:#777;
  letter-spacing:2px;
  font-family: monospace;
"></p>
  </div>
</div>

  </div>

</div>

</div>

<script>
const SECRET = "SKILLSPHERE_ULTRA_SECRET_2026";
const API_KEY = "skillsphere-ss-na-11998";
const WORKER_URL = "https://skillsphere-verify.skillsphere-work.workers.dev/admin-upload";

function generateID() {
  return "SS-" + Math.random().toString(36).substring(2,8).toUpperCase();
}

async function sha256(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

async function issueCertificate() {

  const name = document.getElementById("name").value;
  const course = document.getElementById("course").value;
  const desc = document.getElementById("desc").value;
  const status = document.getElementById("status");

  if (!name || !course) {
    alert("Fill all fields");
    return;
  }

  status.innerText = "Generating...";

  const id = generateID();
  const signature = await sha256(id + SECRET);

  // Upload to Cloudflare
try {
  const res = await fetch(WORKER_URL, {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "x-api-key": API_KEY
    },
    body: JSON.stringify({
      id,
      name,
      course,
      issued: new Date().toISOString().split("T")[0],
      signature
    })
  });

  if (!res.ok) {
    throw new Error("Upload failed");
  }

} catch (err) {
  console.error(err);
  status.innerText = "❌ Upload failed";
  return;
}

  // Prepare certificate UI
  const cert = document.getElementById("certificate");

// Reset positioning for PDF capture
cert.style.display = "block";
cert.style.visibility = "visible";
cert.style.position = "absolute";
cert.style.top = "0";
cert.style.left = "0";
cert.style.margin = "0";
cert.style.zIndex = "1";
  document.getElementById("certName").innerText = name;
  document.getElementById("certCourse").innerText = course;
  document.getElementById("certDesc").innerText = desc;
  document.getElementById("certId").innerText = id;

  document.getElementById("qr").innerHTML = "";

  new QRCode(document.getElementById("qr"), {
    text: `https://skillsphere-edu.github.io/learn/verify.html?id=${id}`,
    width: 130,
    height: 130
  });

  document.getElementById("certDate").innerText =
  "Issued on: " + new Date().toLocaleDateString();
  // Generate PDF
  // Ensure full render before PDF
await new Promise(resolve => setTimeout(resolve, 1200));

await html2pdf().set({
  margin: [0, 0, 0, 0],
  filename: `${name}.pdf`,
  image: { type: 'jpeg', quality: 1 },
  html2canvas: { scale: 3, useCORS: true },
  jsPDF: { unit: 'px', format: [1123, 794], orientation: 'landscape' },
  pagebreak: { mode: ['avoid-all'] }
}).from(cert).save();

status.innerText = "✅ Certificate issued successfully";

cert.style.visibility = "hidden";
cert.style.display = "none";
cert.style.position = "fixed"; // restore original behavior
cert.style.top = "-9999px";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillSphere — Learn. Grow. Lead.</title>
<meta name="description" content="SkillSphere is a student-led upskilling platform offering certified courses, verified credentials, and real-world skills for the next generation of professionals.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>

/* ─────────────────────────────────────────────
   RESET & ROOT
───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }

:root {
  --navy:    #05090f;
  --navy-2:  #0b1120;
  --navy-3:  #111a2e;
  --navy-4:  #192338;
  --navy-5:  #1e2c44;
  --gold:    #c98b0a;
  --gold-l:  #e9a81c;
  --gold-ll: #f5c84a;
  --gold-p:  #fdf0c8;
  --white:   #f4f1eb;
  --off:     #ddd8ce;
  --muted:   #6e80a0;
  --muted-2: #3e4f6a;
  --blue:    #1a68d6;
  --green:   #0d9464;
}

body {
  background: var(--navy);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  line-height: 1.65;
  overflow-x: hidden;
}

h1, h2, h3, h4 {
  font-family: 'Cormorant Garamond', serif;
  line-height: 1.15;
  letter-spacing: -0.01em;
}

a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }
button { font-family: 'DM Sans', sans-serif; cursor: pointer; }

/* ─────────────────────────────────────────────
   SCROLLBAR
───────────────────────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--navy-5); border-radius: 10px; }

/* ─────────────────────────────────────────────
   NOISE TEXTURE OVERLAY
───────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ─────────────────────────────────────────────
   NAVIGATION
───────────────────────────────────────────── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 66px;
  background: rgba(5, 9, 15, 0.85);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  border-bottom: 1px solid rgba(201, 139, 10, 0.1);
  transition: background 0.3s;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 11px;
  font-weight: 600;
  font-size: 1.1rem;
  letter-spacing: 0.01em;
  flex-shrink: 0;
}

.logo-sphere {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  position: relative;
  background: conic-gradient(
    from 200deg at 40% 45%,
    #c98b0a 0%,
    #e9a81c 18%,
    #1a68d6 38%,
    #05090f 55%,
    #0b1120 68%,
    #c98b0a 85%,
    #e9a81c 100%
  );
  box-shadow: 0 0 22px rgba(201,139,10,0.4), 0 0 6px rgba(201,139,10,0.2);
  animation: spherePulse 4s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes spherePulse {
  0%, 100% { box-shadow: 0 0 22px rgba(201,139,10,0.4), 0 0 6px rgba(201,139,10,0.2); }
  50%       { box-shadow: 0 0 32px rgba(201,139,10,0.6), 0 0 12px rgba(201,139,10,0.3); }
}

.logo-sphere::after {
  content: '';
  position: absolute;
  top: 5px; left: 7px;
  width: 10px; height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: 50%;
  transform: rotate(-30deg);
  filter: blur(2px);
}

.nav-logo span em {
  font-style: normal;
  color: var(--gold-l);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 2.2rem;
  font-size: 0.82rem;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.nav-links a {
  color: var(--muted);
  transition: color 0.2s;
  position: relative;
  padding-bottom: 2px;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -2px; left: 0; right: 0;
  height: 1px;
  background: var(--gold-l);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s;
}

.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { transform: scaleX(1); }

.nav-cta {
  background: var(--gold);
  color: #07090e;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 0.6rem 1.4rem;
  border-radius: 4px;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  border: none;
  transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
}

.nav-cta:hover {
  background: var(--gold-l);
  box-shadow: 0 0 24px rgba(201,139,10,0.45);
  transform: translateY(-1px);
}

/* Mobile menu toggle */
.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 4px;
}

.nav-hamburger span {
  display: block;
  width: 22px; height: 2px;
  background: var(--white);
  border-radius: 2px;
  transition: all 0.3s;
}

/* ─────────────────────────────────────────────
   HERO
───────────────────────────────────────────── */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: 120px 5% 80px;
  position: relative;
  overflow: hidden;
}

/* grid lines */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(201,139,10,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(201,139,10,0.04) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
}

/* ambient glow */
.hero-glow-1 {
  position: absolute;
  width: 800px; height: 800px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,139,10,0.12) 0%, transparent 65%);
  top: -200px; right: -200px;
  pointer-events: none;
}

.hero-glow-2 {
  position: absolute;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(26,104,214,0.1) 0%, transparent 65%);
  bottom: -100px; left: -100px;
  pointer-events: none;
}

.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5rem;
  align-items: center;
  max-width: 1180px;
  margin: 0 auto;
  width: 100%;
  position: relative;
  z-index: 1;
}

.hero-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(201,139,10,0.1);
  border: 1px solid rgba(201,139,10,0.25);
  border-radius: 40px;
  padding: 0.35rem 1rem 0.35rem 0.6rem;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--gold-ll);
  margin-bottom: 1.6rem;
}

.eyebrow-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--gold-ll);
  box-shadow: 0 0 8px var(--gold-ll);
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

.hero-title {
  font-size: clamp(2.8rem, 4.5vw, 4.2rem);
  font-weight: 700;
  margin-bottom: 1.4rem;
  color: var(--white);
}

.hero-title em {
  font-style: italic;
  color: var(--gold-l);
  display: block;
}

.hero-body {
  font-size: 1rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 470px;
  margin-bottom: 2.4rem;
}

.hero-actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  align-items: center;
}

.btn-gold {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--gold);
  color: #07090e;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 0.9rem 2rem;
  border-radius: 5px;
  letter-spacing: 0.03em;
  border: none;
  transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
}

.btn-gold:hover {
  background: var(--gold-l);
  box-shadow: 0 0 32px rgba(201,139,10,0.45);
  transform: translateY(-2px);
}

.btn-ghost {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: transparent;
  color: var(--off);
  font-size: 0.9rem;
  font-weight: 500;
  padding: 0.9rem 1.6rem;
  border-radius: 5px;
  border: 1px solid rgba(255,255,255,0.15);
  transition: border-color 0.2s, color 0.2s;
}

.btn-ghost:hover {
  border-color: rgba(201,139,10,0.4);
  color: var(--gold-ll);
}

/* HERO VISUAL — big sphere */
.hero-visual {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.sphere-scene {
  width: 360px;
  height: 360px;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.sphere-core {
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: conic-gradient(
    from 0deg at 50% 50%,
    #c98b0a 0%,
    #e9a81c 12%,
    #1a68d6 30%,
    #0b1120 50%,
    #05090f 62%,
    #c98b0a 78%,
    #e9a81c 92%,
    #c98b0a 100%
  );
  box-shadow:
    0 0 80px rgba(201,139,10,0.35),
    0 0 160px rgba(201,139,10,0.12),
    inset 0 0 60px rgba(5,9,15,0.6);
  animation: coreRotate 14s linear infinite;
  position: relative;
  z-index: 2;
}

@keyframes coreRotate {
  from { filter: hue-rotate(0deg); }
  to   { filter: hue-rotate(360deg); }
}

.sphere-core::after {
  content: '';
  position: absolute;
  top: 18%; left: 20%;
  width: 30%; height: 18%;
  background: rgba(255,255,255,0.18);
  border-radius: 50%;
  transform: rotate(-30deg);
  filter: blur(4px);
}

.orbit {
  position: absolute;
  border-radius: 50%;
  border: 1px solid transparent;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.orbit-1 {
  width: 280px; height: 280px;
  border-color: rgba(201,139,10,0.2);
  animation: orbit1 20s linear infinite;
}

.orbit-2 {
  width: 340px; height: 340px;
  border-color: rgba(26,104,214,0.15);
  animation: orbit2 32s linear infinite reverse;
}

.orbit-3 {
  width: 310px; height: 310px;
  border: none;
  border-top: 1px solid rgba(201,139,10,0.12);
  animation: orbit3 26s linear infinite;
}

@keyframes orbit1 {
  from { transform: rotate(0deg) rotateX(60deg); }
  to   { transform: rotate(360deg) rotateX(60deg); }
}
@keyframes orbit2 {
  from { transform: rotate(0deg) rotateX(45deg) rotateY(20deg); }
  to   { transform: rotate(360deg) rotateX(45deg) rotateY(20deg); }
}
@keyframes orbit3 {
  from { transform: rotate(30deg) rotateX(70deg); }
  to   { transform: rotate(390deg) rotateX(70deg); }
}

.orbit-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--gold-ll);
  box-shadow: 0 0 12px var(--gold-ll), 0 0 24px rgba(201,139,10,0.5);
  position: absolute;
  top: -4.5px; left: 50%;
  transform: translateX(-50%);
}

.orbit-dot-2 {
  width: 6px; height: 6px;
  background: #4fa0ff;
  box-shadow: 0 0 10px #4fa0ff;
  top: auto; bottom: -3px; left: 50%;
}

/* stat pills floating near sphere */
.stat-float {
  position: absolute;
  background: rgba(11, 17, 32, 0.92);
  border: 1px solid rgba(201,139,10,0.22);
  border-radius: 8px;
  padding: 0.6rem 1rem;
  backdrop-filter: blur(10px);
  z-index: 3;
}

.sf-top  { top: 8%; right: -5%; animation: floatY 4s ease-in-out infinite; }
.sf-bot  { bottom: 14%; left: -6%; animation: floatY 4s ease-in-out infinite 2.2s; }

@keyframes floatY {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-10px); }
}

.sf-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 2px; }
.sf-val   { font-family: 'Cormorant Garamond', serif; font-size: 1.25rem; font-weight: 700; color: var(--gold-ll); }

/* ─────────────────────────────────────────────
   STATS STRIP
───────────────────────────────────────────── */
.stats-strip {
  background: var(--navy-3);
  border-top: 1px solid rgba(201,139,10,0.1);
  border-bottom: 1px solid rgba(201,139,10,0.1);
  padding: 2.4rem 5%;
}

.stats-strip-inner {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  text-align: center;
}

.stat-val {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.6rem;
  font-weight: 700;
  color: var(--gold-l);
  display: block;
  line-height: 1;
}

.stat-lbl {
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-top: 0.35rem;
}

/* ─────────────────────────────────────────────
   SECTION COMMON
───────────────────────────────────────────── */
section { padding: 6.5rem 5%; position: relative; }

.max-w { max-width: 1180px; margin: 0 auto; }

.section-kicker {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--gold);
  display: block;
  margin-bottom: 0.75rem;
}

.section-kicker::before { content: '— '; }

.section-heading {
  font-size: clamp(2rem, 3.2vw, 2.8rem);
  font-weight: 700;
  margin-bottom: 0.9rem;
  color: var(--white);
}

.section-sub {
  font-size: 0.95rem;
  color: var(--muted);
  max-width: 560px;
  line-height: 1.8;
}

/* fade-in animation — only active when JS has loaded */
.js-ready .reveal {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 0.7s ease, transform 0.7s ease;
}

.js-ready .reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ─────────────────────────────────────────────
   ABOUT SKILLSPHERE
───────────────────────────────────────────── */
#about { background: var(--navy-2); }

.about-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6rem;
  align-items: center;
}

.about-visual {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* animated diagram */
.about-diagram {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 1;
  position: relative;
}

.diag-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 135px; height: 135px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--navy-3), var(--navy-5));
  border: 2px solid rgba(201,139,10,0.35);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 5;
  box-shadow: 0 0 40px rgba(201,139,10,0.15);
}

.diag-center span {
font-style: bold;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold-l);
  text-align: center;
  line-height: 1.4;
}

.diag-ring {
  position: absolute;
  top: 50%; left: 50%;
  border-radius: 50%;
  border: 1px dashed rgba(201,139,10,0.15);
  transform: translate(-50%, -50%);
}

.diag-ring-1 { width: 200px; height: 200px; animation: spinSlow 25s linear infinite; }
.diag-ring-2 { width: 310px; height: 310px; border-color: rgba(26,104,214,0.12); animation: spinSlow 35s linear infinite reverse; }

@keyframes spinSlow {
  from { transform: translate(-50%,-50%) rotate(0deg); }
  to   { transform: translate(-50%,-50%) rotate(360deg); }
}

.diag-node {
  position: absolute;
  width: 90px; height: 90px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  font-size: 0.58rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  text-align: center;
  border: 1px solid rgba(201,139,10,0.2);
  background: var(--navy-3);
  transition: transform 0.8s;
}

.diag-node:hover { transform: scale(1.08); }
.diag-node .dn-icon { font-size: 1.3rem; }
.diag-node .dn-label { color: var(--white); line-height: 1.3; }

.dn-1 { top: 10%; left: 50%; transform: translate(-50%, 0); }
.dn-2 { top: 50%; right:  2%; transform: translate(0, -50%); }
.dn-3 { bottom: 10%; left: 50%; transform: translate(-50%, 0); }
.dn-4 { top: 50%; left:  2%; transform: translate(0, -50%); }

.about-content h2 { margin-bottom: 1.2rem; }

.about-mission {
  background: var(--navy-3);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  padding: 1.2rem 1.4rem;
  margin: 1.6rem 0;
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.15rem;
  color: var(--off);
  line-height: 1.65;
}

.about-pillars {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.8rem;
  margin-top: 1.6rem;
}

.pillar {
  background: var(--navy-3);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 8px;
  padding: 1rem 1.1rem;
  transition: border-color 0.25s, transform 0.25s;
}

.pillar:hover {
  border-color: rgba(201,139,10,0.2);
  transform: translateY(-2px);
}

.pillar-icon { font-size: 1.3rem; margin-bottom: 0.5rem; }
.pillar h4 { font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; }
.pillar p  { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

/* ─────────────────────────────────────────────
   FOUNDERS
───────────────────────────────────────────── */
#founders { background: var(--navy); }

.founders-header {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 4rem;
  align-items: end;
  margin-bottom: 4rem;
}

.founders-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1.2rem;
}

.founder-card {
  background: var(--navy-2);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s, border-color 0.3s, box-shadow 0.3s;
}

.founder-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--blue), var(--gold));
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.4s ease;
}

.founder-card:hover {
  transform: translateY(-6px);
  border-color: rgba(201,139,10,0.2);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(201,139,10,0.1);
}

.founder-card:hover::before { transform: scaleX(1); }

.founder-avatar {
  width: 82px;
  height: 82px;
  border-radius: 50%;
  margin: 0 auto 1.1rem;
  background: linear-gradient(135deg, rgba(201,139,10,0.2), rgba(26,104,214,0.2));
  border: 2px solid rgba(201,139,10,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold-ll);
  position: relative;
}

.founder-avatar::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid rgba(201,139,10,0.12);
}

.founder-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.35rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
  color: var(--white);
}

.founder-role {
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--gold);
  margin-bottom: 0.9rem;
}

.founder-role2 {
  font-size: 0.68rem;
  font-weight: 650;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--blue);
